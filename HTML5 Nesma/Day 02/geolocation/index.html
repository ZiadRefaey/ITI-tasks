<html>
  <head>
    <title>Simple Map</title>
    <style>
      /* 
 * Always set the map height explicitly to define the size of the div element
 * that contains the map. 
 */
      #map {
        height: 100%;
      }

      /* 
 * Optional: Makes the sample page fill the window. 
 */
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        position: relative;
      }
      .map {
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        position: absolute;
        z-index: 0;
      }
      .select {
        position: absolute;
        top: 60px;
        left: 12px;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <select class="select">
      <option value="egypt">Egypt</option>
      <option value="america">America</option>
      <option value="canada">canada</option>
      <option value="germany">germany</option>
    </select>
    <div id="map" class="map"></div>

    <!-- prettier-ignore -->
    <script>(g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r] + ""); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })
            ({ key: "AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg", v: "weekly" });
      </script>

    <script>
      const selectInput = document.querySelector(".select");
      selectInput.addEventListener("input", function () {
        var selectedOption;
        for (let i = 0; i < geoLocations.length; i++) {
          if (geoLocations[i].country == selectInput.value) {
            selectedOption = geoLocations[i];
          }
        }
        initMap(selectedOption.lat, selectedOption.long);
      });
      const geoLocations = [
        { country: "egypt", lat: 26.8206, long: 30.8025 },
        { country: "germany", lat: 51.1657, long: 10.4515 },
        { country: "canada", lat: 56.1304, long: -106.3468 },
        { country: "america", lat: 37.0902, long: -95.7129 },
      ];
      let map;
      async function initMap(x, y) {
        const { Map } = await google.maps.importLibrary("maps");
        map = new Map(document.getElementById("map"), {
          center: { lat: x, lng: y },
          zoom: 7,
        });
      }

      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(success, error);
      } else {
        alert("please change your browser");
      }

      function success(obj) {
        //   console.log(obj);
        var lat = obj.coords.latitude;
        var lon = obj.coords.longitude;
        // console.log(lat, lon);
        initMap(lat, lon);
      }
      function error(e) {
        console.log(e);
      }
    </script>
  </body>
</html>
