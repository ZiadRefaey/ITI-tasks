<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Document</title>
  </head>
  <body>
    <main>
      <section class="content-section">
        <audio class="LND" autoplay ontimeupdate="changeRange()">
          <source src="Legends never die.mp3" />
        </audio>
        <audio class="awaken" ontimeupdate="changeRange()">
          <source src="Awaken.mp3" />
        </audio>
        <div class="bg-img-wrapper">
          <img class="bg-img" src="Yasuo.png" alt="Hero background image" />
        </div>
        <div class="content-headers">
          <h1 class="page-title">legends never die</h1>
          <h2>Album by <span class="band">Against the current</span></h2>
        </div>
        <div class="cards-container">
          <div class="card-wrapper">
            <img src="Yasuo.png" class="card-img" />
            <div class="card-content">
              <h2 class="card-header">Legends never die</h2>
              <div class="card-stats">
                <div class="card-likes">
                  <i class="fa-solid fa-heart"></i> 155 Likes
                </div>
                <div class="card-comments">
                  <i class="fa-solid fa-comment"></i> 24 comments
                </div>
              </div>
              <button class="card-control LND-card-control" onclick="playLND()">
                <i class="fa-solid fa-play"></i>
              </button>
              <p class="card-timer LND-timer">5:11</p>
            </div>
          </div>

          <div class="card-wrapper">
            <img src="Riven.png" class="card-img" />
            <div class="card-content">
              <h2 class="card-header">Awaken by Valerie</h2>
              <div class="card-stats">
                <div class="card-likes">
                  <i class="fa-solid fa-heart"></i> 540 Likes
                </div>
                <div class="card-comments">
                  <i class="fa-solid fa-comment"></i> 11 comments
                </div>
              </div>
              <button
                class="card-control awaken-card-control"
                onclick="playAwaken()"
              >
                <i class="fa-solid fa-play"></i>
              </button>
              <p class="card-timer awaken-timer">5:11</p>
            </div>
          </div>
        </div>
      </section>
      <section class="controls-section">
        <input
          class="progress-slider slider"
          min="0"
          value="0"
          type="range"
          oninput="changeTime(this)"
        />
        <div class="controls-container">
          <div class="controls-headers">
            <h2 class="controls-title">Legends Never Die</h2>
          </div>
          <div class="controls-btns">
            <button class="btn-pause" onclick="pauseAudio()">
              <i class="fa-solid fa-pause"></i>
              <!-- <i class="fa-solid fa-play"></i> -->
            </button>
            <button class="btn-play" onclick="playAudio()">
              <i class="fa-solid fa-play"></i>
            </button>
            <button class="btn-stop" onclick="stopAudio()">
              <i class="fa-solid fa-stop"></i>
            </button>
          </div>
          <div class="controls-RHS">
            <div>
              <span class="current-duration">0:00</span> /
              <span class="total-duration">5:11</span>
            </div>
            <div class="volume-container">
              <button class="volume-btn" onclick="muteAudio()">
                <i class="fa-solid fa-volume-high volume-high"></i>
                <i class="fa-solid fa-volume-xmark volume-mute hidden"></i>
              </button>
              <input
                class="slider volume-slider"
                type="range"
                oninput="changeVol(this)"
                min="0"
                max="1"
                step="0.1"
                value="1"
              />
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
