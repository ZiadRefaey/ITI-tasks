<div class="w-full rounded-xl bg-blue-100 px-8 py-6 flex flex-col items-start justify-center">
  <div class="flex items-center justify-start gap-4">
    <input type="checkbox" [checked]="todoInfo.isChecked" />
    <p>{{ todoInfo.title }}</p>
  </div>
  <p class="self-end text-sm">{{ todoInfo.date | date }}</p>
</div>
