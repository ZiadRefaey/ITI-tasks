<div class="w-7xl overflow-y-hidden flex-1 mx-auto py-4 gap-2 flex flex-col">
  <button class="bg-blue-600 rounded-xl py-4 px-8 text-white" (click)="createTodo()">
    Create Todo
  </button>
  <ng-icon name="heroPencil" class="ng-pencil"></ng-icon>
  <button class="bg-green-600 rounded-xl py-4 px-8 text-white" (click)="displayTodos()">
    Display Todos
  </button>
  <button class="bg-red-600 rounded-xl py-4 px-8 text-white" (click)="deleteTodo('3406')">
    Delete Todo
  </button>
  @for (item of todoList; track item.title) {
    <app-todo-item [todoInfo]="item"></app-todo-item>
  }
</div>
